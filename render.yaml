services:
  - type: web
    name: 2match-backend
    env: node
    plan: starter
    region: oregon
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: 2match-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 3000
      # Add your other environment variables here
      # - key: CLOUDINARY_CLOUD_NAME
      #   sync: false
      # - key: CLOUDINARY_API_KEY
      #   sync: false
      # - key: CLOUDINARY_API_SECRET
      #   sync: false
      # - key: REDIS_URL
      #   fromService:
      #     type: redis
      #     name: 2match-redis
      #     property: connectionString
      # - key: SENTRY_DSN
      #   sync: false
      # - key: CORS_ORIGIN
      #   value: https://yourdomain.com
      # - key: FRONTEND_URL
      #   value: https://yourdomain.com

databases:
  - name: 2match-db
    databaseName: 2match
    plan: starter
    region: oregon

