services:
  - type: web
    name: 2match-backend
    env: node
    plan: starter
    region: oregon
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: 2match-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: 2match-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false  # Set in Render dashboard: https://your-frontend.vercel.app
      - key: CLIENT_URL
        sync: false  # Same as CORS_ORIGIN
      # Cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Stripe
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PREMIUM_PRICE_ID
        sync: false
      - key: STRIPE_PLATINUM_PRICE_ID
        sync: false
      # Redis (uncomment when Redis service is added)
      # - key: REDIS_URL
      #   fromService:
      #     type: redis
      #     name: 2match-redis
      #     property: connectionString
      # Sentry (optional)
      # - key: SENTRY_DSN
      #   sync: false

databases:
  - name: 2match-db
    databaseName: twomatch
    plan: starter
    region: oregon
